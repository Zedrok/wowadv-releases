name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        shell: bash
        working-directory: ./electron
        run: npm ci

      - name: Build application
        shell: bash
        working-directory: ./electron
        run: |
          # Retry up to 3 times for network errors
          for i in 1 2 3; do
            echo "Build attempt $i..."
            npm run dist && exit 0
            echo "Build failed, retrying..."
            sleep $((i * 10))
          done
          exit 1

      - name: Extract version from package.json
        id: version
        run: |
          $version = (Get-Content electron/package.json | ConvertFrom-Json).version
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Delete existing release if exists
        run: |
          gh release delete v${{ steps.version.outputs.VERSION }} --yes --repo Zedrok/wowadv-releases || true
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          token: ${{ secrets.RELEASES_TOKEN }}
          repository: Zedrok/wowadv-releases
          draft: false
          prerelease: false
          files: |
            electron/dist/Bakers Raid Monitor.exe
