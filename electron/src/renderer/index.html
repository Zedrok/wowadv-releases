<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baker's Raid Monitor</title>

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
  <link rel="manifest" href="../assets/site.webmanifest" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style-new.css" />
</head>
<body>

  <!-- ── Titlebar ─────────────────────────────────────────── -->
  <header class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <i class="fa-solid fa-shield-halved titlebar-icon"></i>
      <span class="app-title">Baker's Raid Monitor</span>
      <span id="infoTimestamp" class="info-timestamp">—</span>
    </div>
    <div class="titlebar-right">
      <div class="status-pill" id="statusPill">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Inactivo</span>
      </div>
      <button class="btn btn-gold"    id="btnToggleScraper" title="Iniciar scraper"><i class="fa-solid fa-play"></i> <span id="btnScraperText">Start</span></button>
      <button class="btn btn-outline" id="btnNextRuns" title="Ver próximos runs"><i class="fa-solid fa-calendar-week"></i> Next Runs</button>
      <button class="btn btn-outline" id="btnPrices"  title="Ver lista de precios"><i class="fa-solid fa-coins"></i> Precios</button>
      <button class="btn btn-outline" id="btnLog"     title="Ver logs"><i class="fa-solid fa-terminal"></i> Logs</button>
    </div>
  </header>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- RAIDS                                                   -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="tabRaids">

    <!-- ── Filter bar ── -->
    <div class="filterbar" id="filterbar">
      <!-- Basic filters row -->
      <label class="filter-check" title="Incluye raids que ya ocurrieron">
        <input type="checkbox" id="fAnteriores" />
        <span>Mostrar Anteriores</span>
      </label>
      <label class="filter-label">Día
        <select id="fDay"><option value="">Todos</option></select>
      </label>
      <label class="filter-check">
        <input type="checkbox" id="fDisponibles" />
        <span>Con espacio</span>
      </label>
      <label class="filter-check">
        <input type="checkbox" id="fLock" checked />
        <span>Solo Unlocked</span>
      </label>
      <span class="filter-sep"></span>
      <label class="filter-label">Dificultad
        <select id="fDifficulty"><option value="">Todas</option></select>
      </label>
      <label class="filter-label">Loot
        <select id="fLoot"><option value="">Todos</option></select>
      </label>
      <span class="filter-sep"></span>
      <button class="btn btn-ghost btn-xs" id="btnToggleAdvanced" title="Mostrar filtros avanzados">
        <i class="fa-solid fa-chevron-down"></i> Más
      </button>
      <span class="spacer"></span>
      <input type="text" id="filterInput" placeholder="Buscar..." spellcheck="false" />
      <!-- Advanced filters row (collapsible) -->
      <div class="filter-advanced" id="filterAdvanced" hidden>
        <label class="filter-label">Tipo
          <select id="fTipo"><option value="">Todos</option></select>
        </label>
        <label class="filter-label">Raids
          <select id="fRaids"><option value="">Todas</option></select>
        </label>
        <label class="filter-label">Equipo
          <select id="fTeam"><option value="">Todos</option></select>
        </label>
        <label class="filter-check">
          <input type="checkbox" id="fDescuento" />
          <span>Con descuento</span>
        </label>
      </div>
    </div>

    <!-- ── Raids List (Card View) ── -->
    <main class="table-wrap">
      <div class="raids-list" id="raidsList">
        <div class="empty-state">
          <i class="fa-solid fa-inbox empty-state-icon"></i>
          <p>Presiona <strong>Start</strong> para iniciar el scraper</p>
        </div>
      </div>
    </main>

    <!-- ── Log panel ── -->
    <aside class="log-panel" id="logPanel" hidden>
      <div class="log-header">
        <span>Scraper output</span>
        <button class="log-clear" id="btnLogClear">Limpiar</button>
      </div>
      <pre id="logContent"></pre>
    </aside>

    <!-- ── Legend ── -->
    <footer class="legend">
      <span class="badge heroic">Heroic</span>
      <span class="badge normal">Normal</span>
      <span class="badge full">Full</span>
      <span class="badge other">Otro</span>
    </footer>

    <!-- ── Raid Modal ── -->
    <div id="raidModalBackdrop" class="raid-modal-backdrop" hidden>
      <div class="raid-modal-box">
        <h3>Registrar Buyer</h3>
        <form id="raidModalForm">
          <div class="form-group">
            <label for="fNickRealm">Nick-Realm</label>
            <input type="text" id="fNickRealm" name="nickRealm" required>
          </div>
          <div class="form-group">
            <label for="fBattleTag">BattleTag</label>
            <input type="text" id="fBattleTag" name="battleTag">
          </div>
          <div class="form-group">
            <label for="fMonto">Monto</label>
            <input type="number" id="fMonto" name="monto" required>
          </div>

          <label class="checkbox-label">
            <input type="checkbox" id="fEnableAlarm">
            <span>Establecer alarma</span>
          </label>

          <div id="fAlarmOptions" hidden>
            <div class="form-group">
              <label for="fAlarmSound">Sonido</label>
              <div class="select-preview">
                <select id="fAlarmSound">
                  <option value="../assets/sounds/Cheerfull.ogg">EnhanceQoL - Cheerful</option>
                  <option value="../assets/sounds/Ring.ogg" selected>EnhanceQoL - Ring</option>
                </select>
                <button type="button" class="btn-preview">▶ Escuchar</button>
              </div>
            </div>
            <div class="form-group">
              <label for="fMinutesBefore">Minutos antes</label>
              <input type="number" id="fMinutesBefore" value="15" min="1">
            </div>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn-submit">Registrar</button>
            <button type="button" class="btn-cancel">Cerrar</button>
          </div>
        </form>
      </div>
    </div>

  </div><!-- /tabRaids -->

  <script type="module" src="renderer-index.js"></script>
</body>
</html>
