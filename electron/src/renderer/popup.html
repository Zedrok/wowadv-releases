<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Próximos Runs</title>
  <style>
    :root {
      --bg:         #0d0d14;
      --bg2:        #13131f;
      --bg3:        #1a1a2a;
      --border:     #2a2a3f;
      --gold:       #c8a84b;
      --text:       #c8c8d8;
      --text-dim:   #666688;
      --heroic-bg:  #1e0808;
      --heroic-acc: #8b1a1a;
      --heroic-fg:  #ffbbbb;
      --normal-bg:  #0d0d2a;
      --normal-acc: #3a3aaa;
      --normal-fg:  #ccddff;
      --mythic-bg:  #1a0f28;
      --mythic-acc: #6a2a7a;
      --mythic-fg:  #ffbbff;
      --saved-bg:   #14120a;
      --saved-acc:  #3a3020;
      --saved-fg:   #b89968;
      --green:      #2ecc71;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 12px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 7px 10px 5px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .header-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
    }

    .last-update {
      font-size: 9px;
      color: var(--text-dim);
    }

    /* Toolbar debajo del título */
    .header-toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .search-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 3px 6px;
      font-size: 10px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 120px;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--text-dim); }

    .hbtn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .hbtn:hover  { background: #22223a; color: var(--text); }
    .hbtn.active { background: #22223a; color: var(--gold); border-color: var(--gold); }
    .hbtn-gold   { color: var(--gold); border-color: #6a5820; }
    .hbtn-gold:hover { background: rgba(200,168,75,.15); }

    .hcheck {
      display: flex; align-items: center; gap: 4px;
      cursor: pointer; user-select: none;
    }
    .hcheck input { accent-color: var(--gold); cursor: pointer; width: 11px; height: 11px; }

    /* ── Content ── */
    .content {
      padding: 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Section ── */
    .section { display: flex; flex-direction: column; gap: 5px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .badge {
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .badge-heroic { background: rgba(139,26,26,.5); color: var(--heroic-fg); border: 1px solid var(--heroic-acc); }
    .badge-normal { background: rgba(26,26,122,.5); color: var(--normal-fg); border: 1px solid var(--normal-acc); }
    .badge-mythic { background: rgba(106,42,122,.5); color: var(--mythic-fg); border: 1px solid var(--mythic-acc); }
    .badge-saved { background: rgba(58,48,32,.5); color: var(--saved-fg); border: 1px solid var(--saved-acc); }

    .section-count { font-size: 9px; color: var(--text-dim); }

    .section-raids-name {
      font-size: 9px;
      color: #7777aa;
      font-style: italic;
      margin-top: -2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Cards — carrusel horizontal ── */
    .cards-row {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      cursor: grab;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .cards-row::-webkit-scrollbar { display: none; }
    .cards-row.dragging { cursor: grabbing; user-select: none; }

    /* ── Carrusel wrapper con fades ── */
    .carousel-wrap {
      position: relative;
    }
    .carousel-wrap::before,
    .carousel-wrap::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 2px;
      width: 28px;
      pointer-events: none;
      z-index: 2;
      transition: opacity 0.2s;
      opacity: 0;
    }
    .carousel-wrap::before {
      left: 0;
      background: linear-gradient(to right, rgba(13,13,20,0.85), transparent);
    }
    .carousel-wrap::after {
      right: 0;
      background: linear-gradient(to left, rgba(13,13,20,0.85), transparent);
    }
    .carousel-wrap.has-left::before  { opacity: 1; }
    .carousel-wrap.has-right::after  { opacity: 1; }

    /* Zonas clickeables de avance (bordes del carrusel) */
    .carousel-arrow {
      position: absolute;
      top: 0;
      bottom: 2px;
      width: 28px;
      z-index: 3;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
      user-select: none;
    }
    .carousel-arrow.arr-left  { left: 0; }
    .carousel-arrow.arr-right { right: 0; }
    .carousel-wrap.has-left  .arr-left  { opacity: 1; pointer-events: auto; }
    .carousel-wrap.has-right .arr-right { opacity: 1; pointer-events: auto; }

    .card {
      border-radius: 5px;
      padding: 7px 9px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 0 0 calc(50% - 3px);
      scroll-snap-align: start;
      overflow: hidden;
    }
    .card.heroic { background: var(--heroic-bg); border-color: var(--heroic-acc); }
    .card.normal { background: var(--normal-bg); border-color: var(--normal-acc); }
    .card.mythic { background: var(--mythic-bg); border-color: var(--mythic-acc); }
    .card.saved { background: var(--saved-bg); border-color: var(--saved-acc); }
    .card.card-full { opacity: 0.55; border-style: dashed; }

    .card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 4px;
    }

    .card-datetime {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
    }

    .card-books {
      font-size: 10px;
      font-weight: 700;
      padding: 0px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,.07);
      white-space: nowrap;
    }
    .card-books.high { background: rgba(231,76,60,.25); color: #ffaaaa; }

    .card-team {
      font-size: 10px;
      font-weight: 600;
      color: var(--text);
    }

    .card-raids {
      font-size: 9px;
      color: #8888aa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 8px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .tag-discount { background: rgba(46,204,113,.2); color: var(--green); border: 1px solid rgba(46,204,113,.3); }
    .tag-loot     { background: rgba(255,255,255,.04); color: var(--text-dim); border: 1px solid var(--border); }

    .card-notes {
      font-size: 8px;
      color: #8888aa;
      font-style: italic;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }

    /* Full row label */
    .row-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
      padding-left: 1px;
    }

    .no-runs {
      font-size: 10px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* Vista compacta */
    body.compact .card        { padding: 4px 7px; gap: 2px; }
    body.compact .card-footer { display: none; }
    body.compact .card-notes  { display: none; }
    body.compact .content     { gap: 7px; padding: 6px 8px; }

    /* Tooltip de precios — sigue el cursor */
    .price-tip {
      position: fixed;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      min-width: 180px; max-width: 300px;
      z-index: 9999;
      pointer-events: none;
    }
    .ptip-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 10px; padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .ptip-row:last-child { border-bottom: none; }
    .ptip-name  { font-size: 10px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ptip-price { font-size: 11px; font-weight: 700; color: var(--gold); white-space: nowrap; flex-shrink: 0; }

    /* ── Filter panel ── */
    .filter-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 5px 10px 6px;
      border-top: 1px solid var(--border);
    }
    .filter-panel[hidden] { display: none; }

    .filter-chip {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 8px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.3px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      transition: opacity 0.15s, color 0.15s;
    }
    .filter-chip.chip-heroic { background: rgba(139,26,26,.4); color: var(--heroic-fg); border-color: var(--heroic-acc); }
    .filter-chip.chip-normal { background: rgba(26,26,122,.4); color: var(--normal-fg); border-color: var(--normal-acc); }
    .filter-chip.chip-mythic { background: rgba(122,26,138,.4); color: var(--mythic-fg); border-color: var(--mythic-acc); }
    .filter-chip.chip-saved { background: rgba(58,48,32,.4); color: var(--saved-fg); border-color: var(--saved-acc); }
    .filter-chip.hidden-chip { opacity: 0.35; background: transparent; color: var(--text-dim); border-color: var(--border); text-decoration: line-through; }

    /* Scrollbar */
    ::-webkit-scrollbar            { width: 4px; }
    ::-webkit-scrollbar-track      { background: var(--bg); }
    ::-webkit-scrollbar-thumb      { background: #2a2a4a; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <span class="header-title">▦ Próximos Runs</span>
      <span class="last-update" id="lastUpdate">—</span>
    </div>
    <div class="header-toolbar">
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar..." spellcheck="false" />
      <label class="hbtn hcheck" title="Mostrar runs llenos">
        <input type="checkbox" id="chkFull" /> Full
      </label>
      <label class="hbtn hcheck" title="Mostrar runs pasados">
        <input type="checkbox" id="chkPast" /> Pasados
      </label>
      <button class="hbtn" id="btnCompact">⊟ Compacta</button>
      <button class="hbtn" id="btnFilter">⊞ Categorías</button>
    </div>
    <div id="filterPanel" class="filter-panel" hidden></div>
  </div>

  <div class="content" id="content">
    <p style="color:var(--text-dim);padding:20px 0;text-align:center;">Cargando...</p>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
