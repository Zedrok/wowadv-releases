<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Próximos Runs</title>
  <style>
    :root {
      --bg:         #0d0d14;
      --bg2:        #13131f;
      --bg3:        #1a1a2a;
      --border:     #2a2a3f;
      --gold:       #c8a84b;
      --text:       #c8c8d8;
      --text-dim:   #666688;
      --heroic-bg:  #1e0808;
      --heroic-acc: #8b1a1a;
      --heroic-fg:  #ffbbbb;
      --normal-bg:  #080818;
      --normal-acc: #1a1a7a;
      --normal-fg:  #aabbff;
      --green:      #2ecc71;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 12px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 7px 10px 5px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .header-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
    }

    .last-update {
      font-size: 9px;
      color: var(--text-dim);
    }

    /* Toolbar debajo del título */
    .header-toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .hbtn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .hbtn:hover  { background: #22223a; color: var(--text); }
    .hbtn.active { background: #22223a; color: var(--gold); border-color: var(--gold); }
    .hbtn-gold   { color: var(--gold); border-color: #6a5820; }
    .hbtn-gold:hover { background: rgba(200,168,75,.15); }

    .hcheck {
      display: flex; align-items: center; gap: 4px;
      cursor: pointer; user-select: none;
    }
    .hcheck input { accent-color: var(--gold); cursor: pointer; width: 11px; height: 11px; }

    /* ── Content ── */
    .content {
      padding: 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Section ── */
    .section { display: flex; flex-direction: column; gap: 5px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .badge {
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .badge-heroic { background: rgba(139,26,26,.5); color: var(--heroic-fg); border: 1px solid var(--heroic-acc); }
    .badge-normal { background: rgba(26,26,122,.5); color: var(--normal-fg); border: 1px solid var(--normal-acc); }

    .section-count { font-size: 9px; color: var(--text-dim); }

    /* ── Cards — dos columnas ── */
    .cards-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .card {
      border-radius: 5px;
      padding: 7px 9px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      overflow: hidden;
    }
    .card.heroic { background: var(--heroic-bg); border-color: var(--heroic-acc); }
    .card.normal { background: var(--normal-bg); border-color: var(--normal-acc); }
    .card.card-full { opacity: 0.55; border-style: dashed; }

    .card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 4px;
    }

    .card-datetime {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
    }

    .card-books {
      font-size: 10px;
      font-weight: 700;
      padding: 0px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,.07);
      white-space: nowrap;
    }
    .card-books.high { background: rgba(231,76,60,.25); color: #ffaaaa; }

    .card-team {
      font-size: 10px;
      font-weight: 600;
      color: var(--text);
    }

    .card-raids {
      font-size: 9px;
      color: #8888aa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 8px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .tag-discount { background: rgba(46,204,113,.2); color: var(--green); border: 1px solid rgba(46,204,113,.3); }
    .tag-loot     { background: rgba(255,255,255,.04); color: var(--text-dim); border: 1px solid var(--border); }

    .card-notes {
      font-size: 8px;
      color: #8888aa;
      font-style: italic;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }

    /* Full row label */
    .row-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
      padding-left: 1px;
    }

    .no-runs {
      font-size: 10px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* Vista compacta */
    body.compact .card        { padding: 4px 7px; gap: 2px; }
    body.compact .card-footer { display: none; }
    body.compact .card-notes  { display: none; }
    body.compact .content     { gap: 7px; padding: 6px 8px; }

    /* Tooltip de precios (absolute dentro del section-title) */
    .price-tip {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      min-width: 180px; max-width: 300px;
      z-index: 200;
    }
    /* Cuando está en el section-title, cae justo debajo alineado a la derecha */
    .section-title .price-tip {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
    }
    .ptip-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 10px; padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .ptip-row:last-child { border-bottom: none; }
    .ptip-name  { font-size: 10px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ptip-price { font-size: 11px; font-weight: 700; color: var(--gold); white-space: nowrap; flex-shrink: 0; }

    /* Scrollbar */
    ::-webkit-scrollbar            { width: 4px; }
    ::-webkit-scrollbar-track      { background: var(--bg); }
    ::-webkit-scrollbar-thumb      { background: #2a2a4a; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <span class="header-title">▦ Próximos Runs</span>
      <span class="last-update" id="lastUpdate">—</span>
    </div>
    <div class="header-toolbar">
      <label class="hbtn hcheck" title="Mostrar runs llenos">
        <input type="checkbox" id="chkFull" /> Full
      </label>
      <button class="hbtn" id="btnCompact">⊟ Compacta</button>
      <button class="hbtn hbtn-gold" id="btnReload">⟳ Refresh</button>
    </div>
  </div>

  <div class="content" id="content">
    <p style="color:var(--text-dim);padding:20px 0;text-align:center;">Cargando...</p>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
